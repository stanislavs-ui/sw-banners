<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Banner — Запуск 20 квітня</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #111;
    font-family: 'DM Sans', sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 40px;
    gap: 16px;
  }
  .label {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 3px;
    color: #555;
    text-align: center;
  }

  /* === Banner 1080x1080, previewed at 50% === */
  .banner {
    width: 1080px;
    height: 1080px;
    position: relative;
    overflow: hidden;
    background: #000;
    transform: scale(0.5);
    transform-origin: top center;
    margin-bottom: -540px;
  }

  /* --- City image, full, centered at top --- */
  .city-img {
    position: absolute;
    top: -50px;
    left: 50%;
    transform: translateX(-50%);
    width: auto;
    height: 880px;
    opacity: 0.9;
    filter: brightness(1.05) contrast(1.1);
  }

  /* --- Fade overlay: city fades to black at bottom --- */
  .city-fade {
    position: absolute;
    top: 0; left: 0;
    width: 100%;
    height: 900px;
    background: linear-gradient(to bottom, transparent 40%, #000 90%);
    pointer-events: none;
    z-index: 1;
  }

  /* --- Logo: overlapping bottom of city --- */
  .logo {
    position: absolute;
    top: 530px;
    left: 50%;
    transform: translateX(-50%);
    width: 620px;
    height: auto;
    opacity: 0.95;
    z-index: 2;
  }

  /* --- Text: centered in bottom third --- */
  .headline {
    position: absolute;
    bottom: 140px;
    left: 0; right: 0;
    text-align: center;
    z-index: 2;
  }
  .headline .line1 {
    font-size: 56px;
    font-weight: 700;
    letter-spacing: 10px;
    text-transform: uppercase;
    line-height: 1.2;
    color: rgba(255,255,255,0.8);
  }
  .headline .line2 {
    font-size: 108px;
    font-weight: 900;
    letter-spacing: 6px;
    text-transform: uppercase;
    line-height: 1.1;
    margin-top: 12px;
    color: #F5A623;
  }
</style>
</head>
<body>

<div class="label">1080 x 1080 — preview at 50%</div>

<div class="banner">
  <!-- City -->
  <img class="city-img" src="cities/city-fut-3b.jpg" alt="city">
  <div class="city-fade"></div>
  <!-- Side vignettes: left + right fade to black -->
  <div style="position:absolute; top:0; left:0; width:300px; height:700px; background:linear-gradient(to right, #000 0%, transparent 100%); pointer-events:none; z-index:1;"></div>
  <div style="position:absolute; top:0; right:0; width:300px; height:700px; background:linear-gradient(to left, #000 0%, transparent 100%); pointer-events:none; z-index:1;"></div>

  <!-- Logo on top of city (bottom part) -->
  <img class="logo" src="../brand/logo-on-dark-transparent.png" alt="Simple World">

  <!-- Text centered in bottom -->
  <div class="headline">
    <div class="line1">Запуск проєкту</div>
    <div class="line2">20 квітня</div>
  </div>
</div>

</body>
</html>
