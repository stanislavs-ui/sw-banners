<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { background: #000; }
  .banner {
    width: 1200px;
    height: 675px;
    display: flex;
    position: relative;
    overflow: hidden;
    background: #000;
  }
  .left {
    width: 50%;
    background: #000 url('../brand/sw-logo-crop.png') no-repeat center center;
    background-size: 470px auto;
    position: relative;
    z-index: 2;
  }
  .right {
    width: 50%;
    background: #000 url('../characters/alex-v41c-black.jpg') no-repeat center center;
    background-size: auto 620px;
  }
</style>
</head>
<body>
  <div class="banner">
    <div class="left"></div>
    <div class="right"></div>
  </div>
</body>
</html>
