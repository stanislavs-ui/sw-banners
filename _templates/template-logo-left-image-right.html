<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #000; }
  .banner {
    width: 1280px;
    height: 720px;
    display: flex;
    position: relative;
    overflow: hidden;
    background: #000;
  }
  .left {
    width: 45%;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #000;
    z-index: 2;
  }
  .left img {
    width: 560px;
  }
  .right {
    width: 55%;
    position: relative;
  }
  .right img {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }
  .right::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    width: 160px;
    height: 100%;
    background: linear-gradient(to right, #000, transparent);
    z-index: 1;
  }
</style>
</head>
<body>
  <div class="banner">
    <div class="left">
      <img src="../brand/logo-on-dark-transparent.png" alt="Simple World">
    </div>
    <div class="right">
      <img src="cities/city-fut-3b.jpg" alt="City">
    </div>
  </div>
</body>
</html>
